[build]
builder = "NIXPACKS"
buildCommand = "npm install -g pnpm && pnpm install && BASE_PATH=/ NODE_ENV=production pnpm --filter @workspace/fb-guard build && pnpm --filter @workspace/api-server build"

[deploy]
startCommand = "node --enable-source-maps artifacts/api-server/dist/index.mjs"
healthcheckPath = "/api/healthz"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
