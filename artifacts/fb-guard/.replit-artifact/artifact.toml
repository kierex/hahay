kind = "web"
previewPath = "/"
title = "Facebook Guard"
version = "1.0.0"
id = "artifacts/fb-guard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21790

[services.development]
run = "pnpm --filter @workspace/fb-guard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/fb-guard", "run", "build" ]
publicDir = "artifacts/fb-guard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21790"
BASE_PATH = "/"
